<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117" rx="10"/>
  
  <!-- Mac Window Controls -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>
  
  <!-- Boot Sequence -->
  <text x="30" y="70" font-family="monospace" font-size="14" fill="#8b949e">[SYS] Initializing SentinelRecon v2.0... <tspan fill="#3fb950">OK</tspan></text>
  <text x="30" y="90" font-family="monospace" font-size="14" fill="#8b949e">[NET] Bypassing entropy constraints... <tspan fill="#3fb950">OK</tspan></text>
  <text x="30" y="110" font-family="monospace" font-size="14" fill="#8b949e">[INT] Loading Shodan/OTX Modules... <tspan fill="#3fb950">OK</tspan></text>
  <text x="30" y="130" font-family="monospace" font-size="14" fill="#8b949e">[CLD] Priming AWS/Azure/GCP keyspace... <tspan fill="#3fb950">OK</tspan></text>
  
  <text x="450" y="180" font-family="monospace" font-size="14" fill="#58a6ff" text-anchor="middle">System Sequence Initialized. Directives unlocked.</text>
  
  <!-- Logo Glow Effect -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Big ASCII Text -->
  <text x="450" y="260" font-family="monospace" font-size="65" fill="#00FF88" font-weight="bold" text-anchor="middle" filter="url(#glow)" letter-spacing="2">
    SENTINELRECON
  </text>

  <!-- Subtitle -->
  <text x="450" y="310" font-family="monospace" font-size="16" fill="#c9d1d9" text-anchor="middle">
    AI-Powered Reconnaissance  ·  Global Threat Intel  ·  Cloud Auditing
  </text>

  <!-- Info Box -->
  <rect x="150" y="350" width="600" height="80" fill="none" stroke="#30363d" rx="5"/>
  <rect x="360" y="342" width="180" height="16" fill="#0d1117"/>
  <text x="450" y="355" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="bold"> SentinelRecon Framework </text>

  <text x="180" y="385" font-family="monospace" font-size="14" fill="#58a6ff">
    Version: 2.0.0-CORE   ·   Modules: 14   ·   AI Engine: CLAUDE-3
  </text>
  <text x="180" y="410" font-family="monospace" font-size="14" fill="#c9d1d9">
    Target: <tspan fill="#ff7b72">example.com</tspan>   ·   Mode: <tspan fill="#f85149">AGGRESSIVE</tspan>
  </text>

  <!-- Commands Menu -->
  <text x="30" y="480" font-family="monospace" font-size="14" fill="#c9d1d9">
    <tspan fill="#3fb950" font-weight="bold">1</tspan>    scan          Run network and OSINT scans on target
  </text>
  <text x="30" y="500" font-family="monospace" font-size="14" fill="#c9d1d9">
    <tspan fill="#3fb950" font-weight="bold">2</tspan>    cloud         Enumerate AWS/Azure/GCP misconfigurations
  </text>
  <text x="30" y="520" font-family="monospace" font-size="14" fill="#c9d1d9">
    <tspan fill="#3fb950" font-weight="bold">3</tspan>    report        Generate PDF/HTML Enterprise reports
  </text>
  <text x="30" y="540" font-family="monospace" font-size="14" fill="#c9d1d9">
    <tspan fill="#3fb950" font-weight="bold">4</tspan>    config        Manage API keys (Shodan, OTX, Claude)
  </text>
  
  <!-- Prompt -->
  <text x="30" y="580" font-family="monospace" font-size="16" fill="#c9d1d9" font-weight="bold">
    Command: <tspan fill="#58a6ff">█</tspan>
  </text>
</svg>
